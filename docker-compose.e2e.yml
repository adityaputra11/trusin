services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terusin
      POSTGRES_PASSWORD: terusin
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d terusin"]
      interval: 1s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 2s
      retries: 30
