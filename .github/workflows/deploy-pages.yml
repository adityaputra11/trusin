name: Deploy marketing and docs

on:
  push:
    branches: [master]
    paths:
      - 'apps/landing/**'
      - 'website/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  marketing:
    name: Deploy marketing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/landing/package-lock.json
      - run: npm ci
        working-directory: apps/landing
      - run: npm run build
        working-directory: apps/landing
        env:
          VITE_APP_URL: https://app.terusin-dev.my.id
          VITE_DOCS_URL: https://docs.terusin-dev.my.id
          VITE_GITHUB_URL: https://github.com/adityaputra11/terusin
          VITE_MANAGED_CONTACT_EMAIL: ${{ secrets.MANAGED_CONTACT_EMAIL }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist --project-name=terusin-marketing --branch=main

  docs:
    name: Deploy documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=terusin-docs --branch=main
