name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: CLI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
      - name: Build CLI
        run: cargo build --release --bin terusin
      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist/package
          cp target/release/terusin dist/package/
          tar -C dist/package -czf "dist/terusin-${{ matrix.target }}.tar.gz" terusin
      - uses: actions/upload-artifact@v5
        with:
          name: terusin-${{ matrix.target }}
          path: dist/terusin-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum terusin-*.tar.gz > SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/terusin-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
