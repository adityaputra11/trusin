name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release --bin backend --bin web

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/backend
            target/release/web
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - run: |
          mkdir -p deploy/bin
          cp binaries/backend binaries/web deploy/bin/
          cp -r apps/backend/migrations deploy/
          cat > deploy/.env << EOF
DATABASE_URL=${{ secrets.DATABASE_URL }}
REDIS_URL=${{ secrets.REDIS_URL }}
BACKEND_URL=http://localhost:3011
BACKEND_PORT=3011
WEB_PORT=3012
AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}
AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
MAX_RETRIES=5
WORKER_COUNT=4
EOF

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/*
          target: /opt/terusin
          strip_components: 1

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            sudo cp /opt/terusin/terusin-*.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable terusin-backend terusin-web
            sudo systemctl restart terusin-backend terusin-web

