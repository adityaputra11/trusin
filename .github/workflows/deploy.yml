name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the React frontend first — the `web` binary embeds apps/frontend/dist
      # via rust-embed at compile time. Without this the cargo build fails.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build frontend
        working-directory: apps/frontend
        env:
          # Public Cloudflare Turnstile site key. Optional — when unset, the
          # captcha widget is not rendered and login submits no token.
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          npm ci
          npm run build

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release --bin backend --bin web

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/backend
            target/release/web
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - run: mkdir -p deploy/bin

      - run: cp binaries/backend deploy/bin/
      - run: cp binaries/web deploy/bin/
      - run: cp -r apps/backend/migrations deploy/

      - run: |
          cat > deploy/.env <<'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          PORT=3001
          PUBLIC_URL=https://terusin-dev.my.id
          BACKEND_URL=http://localhost:3001
          BACKEND_PORT=3001
          WEB_PORT=3002
          AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
          MAX_RETRIES=5
          WORKER_COUNT=4
          # Cloudflare Turnstile — optional. When SECRET_KEY is empty/unset,
          # captcha verification is skipped (login works without a token).
          TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
          ENVEOF

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/*
          target: /opt/terusin
          strip_components: 1

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            sudo chmod +x /opt/terusin/bin/backend /opt/terusin/bin/web
            sudo cp /opt/terusin/terusin-*.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable terusin-backend terusin-web
            sudo systemctl restart terusin-backend terusin-web

