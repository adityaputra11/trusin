name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release --bin backend --bin web

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/backend
            target/release/web
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - run: mkdir -p deploy/bin
      - run: cp binaries/backend binaries/web deploy/bin/
      - run: cp -r apps/backend/migrations deploy/

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/*
          target: /opt/terusin
          strip_components: 1

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            chmod +x /opt/terusin/bin/*
            systemctl daemon-reload
            systemctl enable terusin-backend terusin-web
            systemctl restart terusin-backend terusin-web
