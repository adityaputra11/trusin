app = "terusin"

[build]
dockerfile = "Dockerfile"

# Secrets are NOT defined here. Committing credentials to fly.toml leaks them
# into git history permanently. Set them via the CLI instead:
#   fly secrets set DATABASE_URL="postgres://..." -a terusin
#   fly secrets set REDIS_URL="redis://..." -a terusin
#   fly secrets set AUTH_USERNAME="admin" AUTH_PASSWORD="..." -a terusin
#   fly secrets set JWT_SECRET="..." -a terusin
# Only non-sensitive config values belong in [[env]] below.

[[services]]
name = "backend"
internal_port = 3011
protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[env]]
    key = "PORT"
    value = "3011"
  [[env]]
    key = "WORKER_COUNT"
    value = "4"

[[services]]
name = "web"
internal_port = 3012
protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 8080
    force_https = true

  [[env]]
    key = "PORT"
    value = "3012"
  [[env]]
    key = "BACKEND_URL"
    value = "http://backend:3011"
