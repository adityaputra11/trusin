services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terusin
      POSTGRES_PASSWORD: terusin
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build: .
    command: backend
    ports:
      - "3011:3011"
    environment:
      DATABASE_URL: postgres://postgres:terusin@postgres:5432/terusin
      REDIS_URL: redis://redis:6379
      PORT: "3011"
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-terusin123}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:5173}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      MAX_RETRIES: "5"
      HOSTED_MODE: "${HOSTED_MODE:-false}"
      INGEST_CANONICAL_HOST: "${INGEST_CANONICAL_HOST:-ingest.trusin.my.id}"
      PLATFORM_ADMIN_TOKEN: "${PLATFORM_ADMIN_TOKEN:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: .
    command: web
    ports:
      - "3012:3012"
    environment:
      DATABASE_URL: postgres://postgres:terusin@postgres:5432/terusin
      BACKEND_URL: http://backend:3011
      PORT: "3012"
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-terusin123}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
